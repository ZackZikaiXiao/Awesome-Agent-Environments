<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Awesome Agent Environments</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f3;
        --fg: #1e2430;
        --muted: #5c6675;
        --card: #ffffff;
        --border: #d9dee8;
        --link: #0f62fe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #f8f8f5 0%, #eef2f8 100%);
        color: var(--fg);
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 640px;
        width: 100%;
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--card);
        box-shadow: 0 18px 60px rgba(16, 24, 40, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
      }

      a {
        color: var(--link);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Awesome Agent Environments</h1>
      <p>The interactive explorer is disabled for now.</p>
      <p>Browse the main list on <a href="https://github.com/ZackZikaiXiao/Awesome-Agent-Environments">GitHub</a>.</p>
    </main>
  </body>
</html>
